services:
  collector:
    build:
      context: .
      dockerfile: Dockerfile.collector
    ports:
      - "50051:50051"

  gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    ports:
      - "8080:8080"
    environment:
      COLLECTOR_ADDR: collector:50051
      GATEWAY_LISTEN: ":8080"
    depends_on:
      - collector
